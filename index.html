<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Roleta Badaladas — Feira de São Pedro</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:wght@600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#1d3a5f; --yellow:#f5b700; --red:#c0392b;
  --light:#eef5ff; --ink:#0d1b2a;
}
html,body{height:100%;overflow:hidden;background:linear-gradient(150deg,#8ec4e0 0%,#b0d4ec 55%,#b8d8c0 100%)}
body{display:flex;align-items:stretch;justify-content:center;padding:8px}
#confettiCanvas{position:fixed;inset:0;pointer-events:none;z-index:9999;display:none}

/* CARD */
.card{
  width:100%;max-width:1280px;background:#fff;
  border-radius:20px;display:flex;flex-direction:column;
  box-shadow:0 10px 60px rgba(29,58,95,0.25);
  overflow:hidden;height:calc(100vh - 16px);
}

/* HEADER */
.hdr{
  display:flex;align-items:center;padding:8px 20px;gap:14px;
  background:#fff;border-bottom:5px solid var(--navy);flex-shrink:0;
}
.hdr-logo-bada img{height:48px;object-fit:contain;display:block}
.hdr-center{flex:1;text-align:center}
.hdr-center h1{
  font-family:'Playfair Display',Georgia,serif;
  font-size:clamp(1.6rem,3.2vw,2.6rem);font-weight:900;
  color:var(--navy);line-height:1;
}
.hdr-center h1 em{color:var(--yellow);font-style:normal}
.hdr-center p{font-size:0.82rem;color:#7090b0;margin-top:3px;font-weight:600}
.hdr-logo-sp img{height:58px;object-fit:contain;display:block}

/* YELLOW STRIP */
.strip{
  background:var(--yellow);text-align:center;padding:5px;
  font-size:10px;font-weight:900;letter-spacing:.35em;text-transform:uppercase;
  color:var(--navy);flex-shrink:0;
}

/* BODY */
.body{display:flex;flex:1;overflow:hidden;min-height:0}

/* WHEEL AREA */
.wheel-area{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:14px;padding:14px 16px;min-width:0;
}
.wheel-wrap{position:relative;flex-shrink:0}
#wheelCanvas{
  display:block;border-radius:50%;
  filter:drop-shadow(0 8px 32px rgba(29,58,95,0.3));
}
/* Pointer */
.ptr{
  position:absolute;top:-22px;left:50%;transform:translateX(-50%);
  width:0;height:0;
  border-left:20px solid transparent;
  border-right:20px solid transparent;
  border-top:44px solid var(--red);
  filter:drop-shadow(0 4px 8px rgba(0,0,0,0.35));
  z-index:10;
}
/* Spin button */
.btn-spin{
  padding:18px 64px;border:none;border-radius:60px;
  background:linear-gradient(135deg,#1d3a5f,#2a5898);
  color:#fff;
  font-family:'Source Serif 4',Georgia,serif;
  font-size:clamp(1.1rem,2vw,1.5rem);font-weight:900;letter-spacing:.06em;
  cursor:pointer;transition:all .22s;
  box-shadow:0 6px 24px rgba(29,58,95,.45);flex-shrink:0;
}
.btn-spin:hover:not(:disabled){
  transform:translateY(-3px);
  box-shadow:0 10px 32px rgba(29,58,95,.55);
  background:linear-gradient(135deg,#25497a,#1d3a5f);
}
.btn-spin:disabled{opacity:.4;cursor:default;transform:none}
/* Result */
.result{
  width:100%;max-width:520px;min-height:64px;
  background:var(--light);border-radius:14px;
  padding:10px 22px;text-align:center;
  border:3px solid transparent;transition:all .3s;flex-shrink:0;
}
.result.show{border-color:var(--yellow);background:#fffce8}
.result .rlabel{
  font-size:0.82rem;font-weight:700;letter-spacing:.22em;
  text-transform:uppercase;color:#8090b0;
}
.result .rval{
  font-family:'Playfair Display',Georgia,serif;
  font-size:clamp(1.4rem,2.5vw,2.1rem);font-weight:900;
  color:var(--navy);margin-top:2px;line-height:1.2;
}

/* PANEL */
.panel{
  width:280px;flex-shrink:0;
  display:flex;flex-direction:column;gap:10px;
  padding:16px 14px 14px;
  border-left:2px solid #dde8f5;overflow:hidden;
}
.panel-title{
  font-size:0.88rem;font-weight:900;letter-spacing:.2em;
  text-transform:uppercase;color:var(--navy);
  padding-bottom:10px;border-bottom:3px solid var(--navy);flex-shrink:0;
}
.add-row{display:flex;gap:8px;flex-shrink:0}
.add-inp{
  flex:1;padding:12px 14px;border:2.5px solid #b8d0e8;border-radius:10px;
  font-family:'Source Serif 4',Georgia,serif;
  font-size:1.05rem;font-weight:600;color:var(--ink);outline:none;
  transition:border .2s;
}
.add-inp:focus{border-color:var(--navy)}
.add-btn{
  padding:12px 16px;border:none;border-radius:10px;
  background:var(--navy);color:#fff;font-size:1.5rem;
  font-weight:900;cursor:pointer;transition:all .2s;flex-shrink:0;line-height:1;
}
.add-btn:hover{background:var(--yellow);color:var(--navy)}
.items{
  list-style:none;display:flex;flex-direction:column;
  gap:6px;overflow-y:auto;flex:1;padding-right:4px;
}
.items::-webkit-scrollbar{width:5px}
.items::-webkit-scrollbar-thumb{background:#b8d0e8;border-radius:3px}
.item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:10px;
  background:var(--light);border:2px solid #dde8f5;transition:all .18s;
}
.item:hover{border-color:#90b8d8;background:#ddeeff}
.dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.iname{
  flex:1;font-size:1.05rem;font-weight:700;
  color:var(--ink);word-break:break-word;line-height:1.3;
}
.del{
  background:none;border:none;cursor:pointer;
  color:#c0d8e8;font-size:1.2rem;padding:2px 5px;
  transition:color .15s;flex-shrink:0;
}
.del:hover{color:var(--red)}
.empty{color:#90a8c0;font-style:italic;font-size:1rem;text-align:center;padding:18px 0}
.save-row{display:flex;gap:8px;flex-shrink:0}
.btn-save{
  flex:1;padding:11px 14px;border:none;border-radius:10px;
  background:linear-gradient(135deg,#1e5c30,#27ae60);
  color:#fff;font-family:'Source Serif 4',Georgia,serif;
  font-size:0.95rem;font-weight:900;letter-spacing:.05em;
  cursor:pointer;transition:all .2s;
  box-shadow:0 3px 10px rgba(30,92,48,.3);
}
.btn-save:hover{background:linear-gradient(135deg,#27ae60,#1e5c30);transform:translateY(-1px)}
.btn-reset{
  padding:11px 14px;border:2px solid #c0d8e8;border-radius:10px;
  background:transparent;color:#5a7090;
  font-family:'Source Serif 4',Georgia,serif;
  font-size:0.88rem;font-weight:700;cursor:pointer;transition:all .2s;
}
.btn-reset:hover{border-color:var(--red);color:var(--red)}
.save-toast{
  text-align:center;font-size:0.82rem;font-weight:700;
  color:#1e5c30;background:#d4f0de;border-radius:8px;
  padding:7px 12px;display:none;flex-shrink:0;
  animation:fadeIn .3s ease;
}
.save-toast.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

/* FOOTER */
.footer{
  border-top:3px solid var(--navy);padding:7px 20px;
  display:flex;align-items:center;justify-content:center;gap:14px;
  background:#eef5ff;flex-shrink:0;
}
.fbrand{
  font-family:'Playfair Display',Georgia,serif;
  font-size:1.5rem;font-weight:900;color:var(--navy);
  text-decoration:none;
}
.fbrand b{color:var(--yellow)}
.fsep{color:#b0c8e0}
.fsub{font-size:.8rem;color:#6a86a0;font-style:italic}
</style>
</head>

    <!-- PANEL -->
    <div class="panel">
      <div class="panel-title">&#127381; Op&ccedil;&otilde;es</div>
      <div class="add-row">
        <input class="add-inp" id="addInp" placeholder="Adicionar&hellip;" maxlength="26"
          onkeydown="if(event.key==='Enter')add()">
        <button class="add-btn" onclick="add()" title="Adicionar">+</button>
      </div>

      <div class="save-row">
        <button class="btn-save" onclick="saveItems()">&#128190; Guardar Op&ccedil;&otilde;es</button>

<script>
const COLS=['#1d3a5f','#f5b700','#2e6da4','#e8a000','#1a5276',
  '#ffc300','#154360','#d4ac0d','#2980b9','#f39c12',
  '#1abc9c','#e74c3c','#8e44ad','#27ae60','#c0392b'];

const DEFAULT_ITEMS=['Torres Vedras','Badaladas','Feira de S. Pedro',
  'Prémio Surpresa','Outra Vez!','Boa Sorte!'];
const STORAGE_KEY='roleta_badaladas_items';
let items=loadItems();

function loadItems(){
  try{
    const saved=localStorage.getItem(STORAGE_KEY);
    if(saved){const arr=JSON.parse(saved);if(Array.isArray(arr)&&arr.length)return arr;}
  }catch(e){}
  return [...DEFAULT_ITEMS];
}
function saveItems(){
  try{
    localStorage.setItem(STORAGE_KEY,JSON.stringify(items));
    const toast=document.getElementById('saveToast');
    toast.className='save-toast show';
    setTimeout(()=>{toast.className='save-toast';},2200);
  }catch(e){alert('Erro ao guardar: '+e.message);}
}
function resetItems(){
  if(!confirm('Repor as opções padrão? As alterações guardadas serão perdidas.'))return;
  localStorage.removeItem(STORAGE_KEY);
  items=[...DEFAULT_ITEMS];
  renderList();
}
let spinning=false,angle=0;
const cv=document.getElementById('wheelCanvas');
const ctx=cv.getContext('2d');

function sizeWheel(){
  const area=document.getElementById('wheelArea');
  const aw=area.clientWidth - 32;
  const ah=area.clientHeight - 180; // minus btn+result+gaps
  const s=Math.max(200,Math.min(aw,ah,800));
  cv.width=s;cv.height=s;
  cv.style.width=s+'px';cv.style.height=s+'px';
  draw();
}

function draw(){
  const W=cv.width,cx=W/2,r=cx-8;
  ctx.clearRect(0,0,W,W);
  if(!items.length){
    ctx.fillStyle='#dde8f5';ctx.beginPath();ctx.arc(cx,cx,r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#5a7090';ctx.font='bold 20px Georgia,serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('Adicione opções!',cx,cx);return;
  }
  const sl=(Math.PI*2)/items.length;
  items.forEach((item,i)=>{
    const s=angle+i*sl,e=s+sl,c=COLS[i%COLS.length];
    ctx.beginPath();ctx.moveTo(cx,cx);ctx.arc(cx,cx,r,s,e);
    ctx.closePath();ctx.fillStyle=c;ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.stroke();
    ctx.save();ctx.translate(cx,cx);ctx.rotate(s+sl/2);
    ctx.textAlign='right';ctx.textBaseline='middle';
    ctx.fillStyle='#fff';
    ctx.shadowColor='rgba(0,0,0,.75)';ctx.shadowBlur=8;
    // Auto-fit: start large, shrink to fit the segment
    // Max available width along radius, then arc-height cap
    const maxW = r * 0.80;
    const arcH = 2 * (r * 0.6) * Math.sin(sl / 2) * 0.85;
    const lbl = item.length > 20 ? item.slice(0,19)+'…' : item;
    let fs = Math.min(Math.round(r * 0.22), Math.round(arcH * 0.75));
    fs = Math.max(fs, 14);
    ctx.font=`900 ${fs}px Source Serif 4,Georgia,serif`;
    while(ctx.measureText(lbl).width > maxW && fs > 12) {
      fs -= 2;
      ctx.font=`900 ${fs}px Source Serif 4,Georgia,serif`;
    }
    ctx.fillText(lbl, r - 14, 0);
    ctx.restore();
  });
  // ring
  ctx.beginPath();ctx.arc(cx,cx,r+4,0,Math.PI*2);
  ctx.strokeStyle='rgba(29,58,95,.3)';ctx.lineWidth=5;ctx.stroke();
  // hub
  ctx.beginPath();ctx.arc(cx,cx,30,0,Math.PI*2);
  ctx.fillStyle='#fff';ctx.fill();
  ctx.strokeStyle='#1d3a5f';ctx.lineWidth=4;ctx.stroke();
  ctx.fillStyle='#f5b700';ctx.font='bold 24px Arial';
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('★',cx,cx);
}

function renderList(){
  const ul=document.getElementById('items');
  if(!items.length){ul.innerHTML='<li class="empty">Sem opções. Adicione acima!</li>';return;}
  ul.innerHTML=items.map((it,i)=>`
    <li class="item">
      <span class="dot" style="background:${COLS[i%COLS.length]}"></span>
      <span class="iname">${esc(it)}</span>
      <button class="del" onclick="del(${i})" title="Apagar">✕</button>
    </li>`).join('');
  draw();
}
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function add(){
  const inp=document.getElementById('addInp');
  const v=inp.value.trim();if(!v)return;
  items.push(v);inp.value='';inp.focus();renderList();
}
function del(i){
  if(spinning)return;items.splice(i,1);renderList();
  document.getElementById('result').className='result';
  document.getElementById('rval').textContent='—';
}

function spin(){
  if(spinning||items.length<2){
    if(items.length<2)alert('Adicione pelo menos 2 opções!');return;
  }
  spinning=true;
  document.getElementById('btnSpin').disabled=true;
  document.getElementById('result').className='result';
  document.getElementById('rval').textContent='…';
  const total=(Math.PI*2*(8+Math.floor(Math.random()*6)));
  const sl=(Math.PI*2)/items.length;
  const off=Math.random()*sl;
  const tgt=total+off,dur=4500+Math.random()*1500;
  const t0=performance.now(),a0=angle;
  const ease=t=>1-Math.pow(1-t,4);
  function frame(now){
    const t=Math.min((now-t0)/dur,1);
    angle=a0+tgt*ease(t);draw();
    if(t<1)requestAnimationFrame(frame);
    else{
      angle=angle%(Math.PI*2);spinning=false;
      document.getElementById('btnSpin').disabled=false;
      result();
    }
  }
  requestAnimationFrame(frame);
}

function result(){
  const sl=(Math.PI*2)/items.length;
  // Pointer sits at -π/2 (top of wheel, 12 o'clock)
  const ptr = -Math.PI / 2;
  // How far is the pointer from the start of the wheel (angle=0 reference)
  const rel = ((ptr - angle) % (Math.PI*2) + Math.PI*2) % (Math.PI*2);
  const idx = Math.floor(rel / sl) % items.length;
  document.getElementById('result').className='result show';
  document.getElementById('rval').textContent='🎉 '+items[idx]+' 🎉';
  confetti();
}

function confetti(){
  const c=document.getElementById('confettiCanvas'),ctx2=c.getContext('2d');
  c.style.display='block';
  const rz=()=>{c.width=innerWidth;c.height=innerHeight;};
  rz();window.addEventListener('resize',rz);
  const cols=['#f5b700','#1d3a5f','#1e5c30','#fff','#e74c3c','#3a6ba0'];
  const ps=Array.from({length:180},()=>({
    x:Math.random()*innerWidth,y:Math.random()*-innerHeight,
    r:Math.random()*7+3,d:Math.random()*180,
    c:cols[Math.floor(Math.random()*cols.length)],
    ti:Math.floor(Math.random()*10)-10,
    tai:Math.random()*.07+.05,ta:0
  }));
  let ang=0,raf;
  (function loop(){
    ctx2.clearRect(0,0,c.width,c.height);
    ps.forEach(p=>{ctx2.beginPath();ctx2.lineWidth=p.r/2;ctx2.strokeStyle=p.c;
      ctx2.moveTo(p.x+p.ti+p.r/3,p.y);ctx2.lineTo(p.x+p.ti,p.y+p.ti+p.r/5);ctx2.stroke();});
    ang+=.01;ps.forEach(p=>{p.ta+=p.tai;p.y+=(Math.cos(ang+p.d)+1+p.r/2)*1.2;
      p.x+=Math.sin(ang)*2;p.ti=Math.sin(p.ta-p.d/3)*12;
      if(p.y>c.height){p.y=-20;p.x=Math.random()*c.width;}});
    raf=requestAnimationFrame(loop);
  })();
  setTimeout(()=>{cancelAnimationFrame(raf);ctx2.clearRect(0,0,c.width,c.height);c.style.display='none';},5500);
}

window.addEventListener('resize',()=>setTimeout(sizeWheel,50));
window.addEventListener('load',()=>{sizeWheel();renderList();});
renderList();setTimeout(sizeWheel,80);
</script>
